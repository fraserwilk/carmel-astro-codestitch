[build]
  publish = "."
  command = "echo 'Static site — no build required'"

# ── Old Astro URL → New page redirects (with and without trailing slash) ──
[[redirects]]
  from = "/emdr"
  to   = "/emdr-clients.html"
  status = 301

[[redirects]]
  from = "/emdr/"
  to   = "/emdr-clients.html"
  status = 301

[[redirects]]
  from = "/work-with-me"
  to   = "/therapy.html"
  status = 301

